services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatmp
      POSTGRES_USER: chatmp
      POSTGRES_PASSWORD: chatmp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatmp -d chatmp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
